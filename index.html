<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Professores PR</title>

  <style>
    *{
      box-sizing:border-box;
    }

    :root{
      --blue-1:#3b82f6;
      --blue-2:#60a5fa;
      --blue-3:#93c5fd;
      --blue-4:#dbeafe;
      --dark:#16325c;
      --text:#22324d;
      --muted:#64748b;
      --white:rgba(255,255,255,0.85);
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI",system-ui,sans-serif;
      color:var(--text);
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(96,165,250,.28), transparent 18%),
        radial-gradient(circle at 85% 75%, rgba(59,130,246,.22), transparent 20%),
        radial-gradient(circle at 80% 15%, rgba(147,197,253,.18), transparent 18%),
        linear-gradient(135deg, #eef6ff 0%, #dcecff 45%, #cfe2ff 100%);
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
      background-size:32px 32px;
      opacity:.3;
      pointer-events:none;
    }

    .bg-orb{
      position:absolute;
      border-radius:50%;
      filter:blur(30px);
      opacity:.45;
      pointer-events:none;
      animation:floatOrb 10s ease-in-out infinite;
    }

    .bg-orb.one{
      width:260px;
      height:260px;
      background:#60a5fa;
      top:8%;
      left:7%;
    }

    .bg-orb.two{
      width:320px;
      height:320px;
      background:#93c5fd;
      bottom:4%;
      right:4%;
      animation-delay:-4s;
    }

    .bg-orb.three{
      width:180px;
      height:180px;
      background:#3b82f6;
      bottom:18%;
      left:14%;
      animation-delay:-2s;
    }

    @keyframes floatOrb{
      0%,100%{ transform:translateY(0) translateX(0) scale(1); }
      50%{ transform:translateY(-18px) translateX(10px) scale(1.05); }
    }

    .portal-wrap{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      pointer-events:none;
      z-index:1;
    }

    .portal{
      position:relative;
      width:220px;
      height:220px;
      opacity:0;
      transform:scale(.7);
      transition:opacity .5s ease, transform .5s ease;
    }

    .portal.show{
      opacity:.95;
      transform:scale(1);
    }

    .ring,
    .ring2,
    .ring3,
    .core{
      position:absolute;
      inset:0;
      border-radius:50%;
    }

    .ring{
      border:6px solid rgba(59,130,246,.9);
      box-shadow:
        0 0 20px rgba(59,130,246,.8),
        0 0 55px rgba(59,130,246,.55),
        inset 0 0 18px rgba(147,197,253,.8);
      animation:spin 3.8s linear infinite;
    }

    .ring2{
      inset:12px;
      border:2px dashed rgba(219,234,254,.95);
      box-shadow:0 0 28px rgba(147,197,253,.65);
      animation:spinReverse 2.7s linear infinite;
    }

    .ring3{
      inset:28px;
      border:3px solid rgba(96,165,250,.85);
      box-shadow:
        0 0 18px rgba(96,165,250,.75),
        inset 0 0 14px rgba(255,255,255,.5);
      animation:pulseRing 1.8s ease-in-out infinite;
    }

    .core{
      inset:56px;
      background:
        radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(147,197,253,.95) 45%, rgba(59,130,246,.95) 100%);
      box-shadow:
        0 0 25px rgba(255,255,255,.85),
        0 0 55px rgba(96,165,250,.75);
      animation:corePulse 1.4s ease-in-out infinite;
    }

    .portal-particle{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:white;
      box-shadow:0 0 12px rgba(255,255,255,.9);
      animation:orbit 2.6s linear infinite;
    }

    .portal-particle.p1{ top:-6px; left:50%; animation-delay:0s; }
    .portal-particle.p2{ top:50%; right:-6px; animation-delay:-.6s; }
    .portal-particle.p3{ bottom:-6px; left:50%; animation-delay:-1.2s; }
    .portal-particle.p4{ top:50%; left:-6px; animation-delay:-1.8s; }

    .portal.opening{
      animation:portalExpand 1.6s ease forwards;
    }

    @keyframes spin{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }

    @keyframes spinReverse{
      from{ transform:rotate(360deg); }
      to{ transform:rotate(0deg); }
    }

    @keyframes pulseRing{
      0%,100%{ transform:scale(1); opacity:.85; }
      50%{ transform:scale(1.05); opacity:1; }
    }

    @keyframes corePulse{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.08); }
    }

    @keyframes orbit{
      0%{ transform:scale(.8); opacity:.6; }
      50%{ transform:scale(1.3); opacity:1; }
      100%{ transform:scale(.8); opacity:.6; }
    }

    @keyframes portalExpand{
      0%{
        opacity:1;
        transform:scale(1);
      }
      100%{
        opacity:1;
        transform:scale(14);
        filter:blur(3px);
      }
    }

    .board{
      position:relative;
      z-index:3;
      width:min(920px, 92vw);
      padding:34px 34px 26px;
      border-radius:28px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.5);
      box-shadow:
        0 24px 60px rgba(22,50,92,.18),
        inset 0 1px 0 rgba(255,255,255,.55);
      animation:fadeUp .95s ease;
      overflow:hidden;
    }

    .board::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, rgba(255,255,255,.18), transparent 35%, rgba(96,165,250,.08));
      pointer-events:none;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(26px) scale(.98);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .title{
      margin:0;
      font-size:clamp(24px, 3vw, 34px);
      text-align:center;
      color:var(--dark);
      font-weight:800;
      letter-spacing:.2px;
    }

    .subtitle{
      margin:8px 0 26px;
      text-align:center;
      color:var(--muted);
      font-size:clamp(14px, 1.8vw, 16px);
    }

    .top{
      display:flex;
      gap:20px;
      align-items:center;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .bot{
      display:flex;
      align-items:center;
      gap:18px;
      flex:1 1 360px;
      min-width:280px;
    }

    .bot-avatar{
      width:96px;
      height:96px;
      position:relative;
      flex-shrink:0;
      animation:floatBot 3s ease-in-out infinite;
    }

    @keyframes floatBot{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-7px); }
    }

    .bot-head{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #ffffff 0%, #eef7ff 30%, #cfe7ff 65%, #8fc1ff 100%);
      border:3px solid rgba(59,130,246,.92);
      box-shadow:
        0 0 20px rgba(59,130,246,.30),
        0 0 45px rgba(147,197,253,.25),
        inset 0 0 24px rgba(255,255,255,.8);
      overflow:hidden;
    }

    .bot-head::before{
      content:"";
      position:absolute;
      width:34px;
      height:34px;
      border-radius:50%;
      top:14px;
      left:16px;
      background:rgba(255,255,255,.7);
      filter:blur(2px);
    }

    .bot-head::after{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.45);
      pointer-events:none;
    }

    .eye{
      position:absolute;
      width:12px;
      height:12px;
      border-radius:50%;
      background:#1d4f91;
      top:34px;
      animation:blinkEye 4.6s infinite;
      box-shadow:0 0 10px rgba(29,79,145,.25);
    }

    .eye.left{ left:25px; }
    .eye.right{ right:25px; }

    @keyframes blinkEye{
      0%,44%,48%,100%{ transform:scaleY(1); }
      46%{ transform:scaleY(.08); }
    }

    .mouth{
      position:absolute;
      left:50%;
      top:58px;
      width:22px;
      height:8px;
      transform:translateX(-50%);
      background:#1d4f91;
      border-radius:0 0 18px 18px;
      transition:all .12s ease;
      box-shadow:0 0 8px rgba(29,79,145,.2);
    }

    .bot-avatar.talking .mouth{
      animation:talkMouth .16s infinite alternate;
    }

    @keyframes talkMouth{
      0%{
        width:18px;
        height:7px;
        border-radius:0 0 18px 18px;
      }
      40%{
        width:14px;
        height:16px;
        border-radius:50%;
      }
      100%{
        width:24px;
        height:10px;
        border-radius:0 0 18px 18px;
      }
    }

    .bot-text{
      min-width:0;
    }

    .bot-name{
      font-size:22px;
      font-weight:800;
      color:var(--dark);
      margin-bottom:4px;
    }

    .bot-role{
      color:var(--muted);
      font-size:15px;
      line-height:1.45;
    }

    .controls{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      flex:1 1 220px;
      min-width:220px;
    }

    .skip-btn{
      border:none;
      background:linear-gradient(135deg, var(--blue-1), var(--blue-2));
      color:white;
      font-weight:700;
      font-size:15px;
      padding:14px 18px;
      border-radius:16px;
      cursor:pointer;
      box-shadow:0 14px 28px rgba(59,130,246,.28);
      transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
    }

    .skip-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 35px rgba(59,130,246,.32);
      filter:brightness(1.04);
    }

    .skip-btn:active{
      transform:translateY(0);
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(59,130,246,.45), transparent);
      margin:10px 0 20px;
    }

    .terminal{
      position:relative;
      min-height:220px;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.62), rgba(239,247,255,.74));
      border:1px solid rgba(147,197,253,.45);
      padding:22px 20px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
    }

    .terminal-top{
      display:flex;
      gap:8px;
      margin-bottom:16px;
    }

    .dot{
      width:11px;
      height:11px;
      border-radius:50%;
      background:#bfdbfe;
      box-shadow:0 0 8px rgba(96,165,250,.35);
    }

    #text{
      white-space:pre-line;
      font-size:clamp(16px, 2vw, 21px);
      line-height:1.75;
      color:#26364f;
      display:inline;
      font-weight:500;
    }

    .cursor{
      display:inline-block;
      margin-left:2px;
      color:#2563eb;
      font-weight:700;
      animation:blink 1s infinite;
    }

    @keyframes blink{
      50%{ opacity:0; }
    }

    .progress-area{
      margin-top:20px;
    }

    .progress-info{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      gap:16px;
      flex-wrap:wrap;
    }

    .progress-label{
      color:var(--muted);
      font-size:14px;
      font-weight:600;
    }

    .progress-percent{
      color:var(--dark);
      font-size:14px;
      font-weight:800;
    }

    .progress-wrap{
      width:100%;
      height:12px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(147,197,253,.30);
      box-shadow:inset 0 1px 3px rgba(22,50,92,.08);
    }

    .progress-bar{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, #3b82f6, #60a5fa, #93c5fd);
      box-shadow:0 0 15px rgba(59,130,246,.35);
      transition:width .28s ease;
    }

    .foot-note{
      margin-top:14px;
      color:#6b7d99;
      font-size:13px;
      text-align:center;
    }

    @media (max-width:700px){
      .board{
        padding:24px 18px 20px;
        border-radius:22px;
      }

      .top{
        gap:14px;
      }

      .controls{
        width:100%;
        justify-content:flex-start;
      }

      .skip-btn{
        width:100%;
      }

      .bot{
        align-items:flex-start;
      }

      .terminal{
        min-height:250px;
        padding:18px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-orb one"></div>
  <div class="bg-orb two"></div>
  <div class="bg-orb three"></div>

  <div class="portal-wrap">
    <div class="portal" id="portal">
      <div class="ring"></div>
      <div class="ring2"></div>
      <div class="ring3"></div>
      <div class="core"></div>
      <div class="portal-particle p1"></div>
      <div class="portal-particle p2"></div>
      <div class="portal-particle p3"></div>
      <div class="portal-particle p4"></div>
    </div>
  </div>

  <div class="board">
    <h1 class="title">📚 Portal Professores do Paraná</h1>
    <div class="subtitle">
      Recursos, planejamento, BNCC, inclusão e apoio pedagógico com IA
    </div>

    <div class="top">
      <div class="bot">
        <div class="bot-avatar" id="myakyBot">
          <div class="bot-head">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
          </div>
        </div>

        <div class="bot-text">
          <div class="bot-name">Myaky Bot</div>
          <div class="bot-role">
            Assistente educacional para apoiar professores com organização, ideias e recursos didáticos.
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="skip-btn" id="skipBtn">Entrar agora</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="terminal">
      <div class="terminal-top">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <span id="text"></span><span class="cursor">|</span>
    </div>

    <div class="progress-area">
      <div class="progress-info">
        <div class="progress-label">Carregando ambiente pedagógico</div>
        <div class="progress-percent" id="progressPercent">0%</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="foot-note">
      Preparando a experiência inicial do portal...
    </div>
  </div>

  <script>
    const lines = [
      "Olá, professor(a). Seja bem-vindo(a).",
      "Você está entrando no Portal Professores do Paraná.",
      "",
      "Eu sou o Myaky Bot.",
      "Fui criado para apoiar o seu planejamento, a sua prática docente e a organização do seu dia a dia.",
      "",
      "Preparando recursos pedagógicos...",
      "Conectando ferramentas educacionais...",
      "Ativando ambiente inteligente do portal...",
      "",
      "Tudo pronto.",
      "Redirecionando para prof-mr.site..."
    ];

    const text = document.getElementById("text");
    const portal = document.getElementById("portal");
    const myakyBot = document.getElementById("myakyBot");
    const progressBar = document.getElementById("progressBar");
    const progressPercent = document.getElementById("progressPercent");
    const skipBtn = document.getElementById("skipBtn");

    let line = 0;
    let char = 0;
    let talkTimer = null;
    let finished = false;
    let redirecting = false;

    function botTalk(){
      myakyBot.classList.add("talking");
      clearTimeout(talkTimer);
      talkTimer = setTimeout(() => {
        myakyBot.classList.remove("talking");
      }, 110);
    }

    function updateProgress(){
      const totalChars = lines.join("\n").length;
      const currentChars = text.textContent.length;
      const percent = Math.max(0, Math.min(100, Math.round((currentChars / totalChars) * 100)));
      progressBar.style.width = percent + "%";
      progressPercent.textContent = percent + "%";
    }

    function startPortalAndRedirect(){
      if(redirecting) return;
      redirecting = true;

      myakyBot.classList.remove("talking");
      progressBar.style.width = "100%";
      progressPercent.textContent = "100%";

      setTimeout(() => {
        portal.classList.add("show");

        setTimeout(() => {
          portal.classList.add("opening");

          setTimeout(() => {
            window.location.href = "https://prof-mr.site/Home.html";
          }, 1400);

        }, 700);
      }, 350);
    }

    function type(){
      if(line >= lines.length){
        finished = true;
        myakyBot.classList.remove("talking");
        updateProgress();
        startPortalAndRedirect();
        return;
      }

      if(char < lines[line].length){
        text.textContent += lines[line].charAt(char);
        char++;
        botTalk();
        updateProgress();
        setTimeout(type, 32);
      }else{
        text.textContent += "\n";
        line++;
        char = 0;
        myakyBot.classList.remove("talking");
        updateProgress();
        setTimeout(type, 300);
      }
    }

    skipBtn.addEventListener("click", () => {
      startPortalAndRedirect();
    });

    setTimeout(type, 700);
  </script>
</body>
</html>
