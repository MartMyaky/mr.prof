<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aprenda Brincando - Modo Infinito</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF8EC;
    --grid-line: rgba(91,140,200,0.15);
    --ink:#2D2A26;
    --purple:#6C5CE7;
    --purple-dark:#5142c4;
    --accent:#FF6B5B;
    --accent-dark:#D8453A;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Quicksand', sans-serif;
    background:var(--paper);
    -webkit-tap-highlight-color: transparent;
  }

  #game-container{
    position:relative;
    width:100vw;
    height:100vh;
    background-color: var(--paper);
    background-image:
      linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
    background-size: 34px 34px;
    display:flex;
    flex-direction:column;
    align-items:center;
    user-select:none;
    -webkit-user-select:none;
  }

  /* ---------- Header ---------- */
  #header{
    flex:0 0 auto;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top: 15px;
    z-index: 100;
  }

  #title{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: clamp(18px, 4vw, 24px);
    color: var(--purple);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.06);
    margin:0;
  }

  #level-badge {
    background: var(--purple);
    color: white;
    padding: 4px 15px;
    border-radius: 20px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 14px;
    margin-top: 5px;
    box-shadow: 0 3px 0 var(--purple-dark);
  }

  /* ---------- Menu de Modos ---------- */
  #top-controls {
    position: absolute;
    top: 15px;
    left: 15px;
    right: 15px;
    display: flex;
    justify-content: space-between;
    z-index: 110;
  }

  .mode-btn {
    background: white;
    border: 2px solid #d9d2c2;
    border-radius: 12px;
    padding: 6px 12px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 12px;
  }

  .mode-btn.active {
    background: var(--purple);
    color: white;
    border-color: var(--purple-dark);
    box-shadow: 0 4px 0 var(--purple-dark);
    transform: translateY(-2px);
  }

  #teacher-btn { background: #ffeb3b; border-color: #fbc02d; }

  /* ---------- Play Area (Slots) ---------- */
  #play-area {
    flex: 1;
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 10px;
    perspective: 1000px;
  }

  .target-slot {
    width: min(22vh, 28vw, 160px);
    height: min(22vh, 28vw, 160px);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: rgba(255,255,255,0.3);
    border-radius: 20px;
    border: 2px dashed #d9d2c2;
  }

  .target-slot svg { width: 100%; height: 100%; overflow: visible; }

  .target-content {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    fill: none;
    stroke: #c9c2b2;
    stroke-width: 3;
    stroke-dasharray: 8 6;
    stroke-linecap: round;
    transition: all 0.3s;
  }

  .target-shape {
    fill: none;
    stroke: #c9c2b2;
    stroke-width: 3;
    stroke-dasharray: 8 6;
    transition: all 0.3s;
  }

  .target-slot.filled { border-style: solid; border-color: var(--purple); background: white; }
  .target-slot.filled .target-content,
  .target-slot.filled .target-shape {
    stroke: var(--purple);
    stroke-dasharray: none;
    opacity: 0.05;
  }

  /* ---------- Draggable Pieces Container ---------- */
  #pieces-container {
    flex: 0 0 160px;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding-bottom: 20px;
  }

  .piece {
    width: min(15vh, 20vw, 110px);
    height: min(15vh, 20vw, 130px);
    touch-action: none;
    cursor: grab;
    z-index: 50;
    filter: drop-shadow(0 4px 4px rgba(0,0,0,0.12));
    transition: transform 0.2s, left 0.4s, top 0.4s;
  }

  .piece.dragging {
    cursor: grabbing;
    transform: scale(1.15) rotate(var(--wiggle, 0deg));
    filter: drop-shadow(0 15px 15px rgba(0,0,0,0.2));
    z-index: 1000;
    transition: none;
  }

  .piece.locked { pointer-events: none; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

  .piece svg { width: 100%; height: 100%; animation: idleBob 3s ease-in-out infinite; }
  .piece.dragging svg { animation: none; }

  @keyframes idleBob{
    0%,100%{ transform: translateY(0) rotate(-1deg); }
    50%{ transform: translateY(-6px) rotate(1deg); }
  }

  .eye-white{ fill:#fff; }
  .eye-pupil{ fill:#2D2A26; }
  .eyes-group{ animation: blink 4s ease-in-out infinite; transform-origin: center; }
  @keyframes blink{ 0%, 90%, 100%{ transform: scaleY(1); } 95%{ transform: scaleY(0.1); } }

  /* ---------- Modais ---------- */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(255,248,236,0.98);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    padding: 20px;
    text-align: center;
  }
  .modal.show { display: flex; }

  .btn-primary {
    font-family: 'Baloo 2', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    background: var(--purple);
    border: none;
    border-radius: 999px;
    padding: 12px 30px;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--purple-dark);
    transition: all 0.15s;
    margin-top: 15px;
  }
  .btn-primary:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--purple-dark); }

  #teacher-panel {
    background: white;
    padding: 25px;
    border-radius: 20px;
    border: 4px solid var(--purple);
    width: 90%;
    max-width: 400px;
  }

  .form-group { margin-bottom: 12px; text-align: left; }
  .form-group label { display: block; font-weight: 700; margin-bottom: 4px; font-size: 13px; }
  .form-group input, .form-group select { width: 100%; padding: 8px; border: 2px solid #ddd; border-radius: 8px; font-family: inherit; }

  #confetti-canvas{ position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1500; }
  #footer-hint { padding-bottom: 10px; color: #9b9282; font-weight: 600; font-size: 14px; }

  /* Overlay de Transição */
  #transition-overlay {
    position: fixed;
    inset: 0;
    background: var(--purple);
    z-index: 3000;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: 'Baloo 2', sans-serif;
    font-size: 40px;
    font-weight: 800;
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.7, 0, 0.3, 1);
  }
  #transition-overlay.active { transform: translateY(0); }
</style>
</head>
<body>

<div id="game-container">
  <div id="top-controls">
    <div style="display:flex; gap:8px;">
      <button class="mode-btn active" onclick="setMode('math')">🔢 Números</button>
      <button class="mode-btn" onclick="setMode('alpha')">🔤 Letras</button>
      <button class="mode-btn" onclick="setMode('shapes')">⚪ Formas</button>
    </div>
    <button id="teacher-btn" class="mode-btn" onclick="openTeacherMode()">👨‍🏫 Professor</button>
  </div>

  <div id="header">
    <h1 id="title">Aprenda Brincando</h1>
    <div id="level-badge">Nível 1</div>
  </div>

  <div id="play-area"></div>

  <div id="footer-hint">Encaixe na ordem correta!</div>

  <div id="pieces-container"></div>

  <canvas id="confetti-canvas"></canvas>

  <!-- Overlay de Transição -->
  <div id="transition-overlay">MUITO BEM! 🌟</div>

  <!-- Modal Modo Professor -->
  <div id="teacher-modal" class="modal">
    <div id="teacher-panel">
      <h2 style="font-family:'Baloo 2'; color:var(--purple); margin-top:0;">Modo Professor</h2>
      <div class="form-group">
        <label>Modo de Ensino:</label>
        <select id="t-mode">
          <option value="math">Números Sequenciais</option>
          <option value="alpha">Letras Sequenciais</option>
          <option value="shapes">Formas Geométricas</option>
        </select>
      </div>
      <div class="form-group">
        <label>Itens por Sequência (1 a 6):</label>
        <input type="number" id="t-slots" value="3" min="1" max="6">
      </div>
      <div class="form-group">
        <label>Começar em:</label>
        <input type="text" id="t-start" value="1">
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn-primary" style="flex:1; margin-top:10px;" onclick="applyTeacherSettings()">Salvar e Reiniciar</button>
        <button class="btn-primary" style="flex:1; margin-top:10px; background:#ccc; box-shadow:0 5px 0 #999;" onclick="closeTeacherMode()">Voltar</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  let gameMode = 'math';
  let slotsPerRound = 3;
  let currentStartValue = 1;
  let level = 1;
  let solvedCount = 0;
  
  const COLORS = [
    { m: '#FF6B5B', d: '#D8453A' },
    { m: '#2EC4B6', d: '#1E9C90' },
    { m: '#FFC145', d: '#E0A21F' },
    { m: '#6C5CE7', d: '#5142c4' },
    { m: '#FF9F1C', d: '#E68A00' },
    { m: '#45AAF2', d: '#2D98DA' }
  ];

  const SHAPES = {
    circle: "M 0,0 m -50,0 a 50,50 0 1,0 100,0 a 50,50 0 1,0 -100,0",
    square: "M -45,-45 L 45,-45 L 45,45 L -45,45 Z",
    triangle: "M 0,-55 L 55,40 L -55,40 Z",
    star: "M 0,-55 L 15,-15 L 55,-15 L 22,10 L 35,50 L 0,25 L -35,50 L -22,10 L -55,-15 L -15,-15 Z",
    heart: "M 0,35 C -70,-25 -35,-70 0,-25 C 35,-70 70,-25 0,35"
  };

  const playArea = document.getElementById('play-area');
  const piecesContainer = document.getElementById('pieces-container');
  const teacherModal = document.getElementById('teacher-modal');
  const levelBadge = document.getElementById('level-badge');
  const transitionOverlay = document.getElementById('transition-overlay');

  // --- SÍNTESE DE VOZ ---
  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'pt-BR';
    msg.rate = 1.0;
    window.speechSynthesis.speak(msg);
  }

  // --- GERAÇÃO DE FASE ---
  function initLevel() {
    playArea.innerHTML = '';
    piecesContainer.innerHTML = '';
    solvedCount = 0;
    levelBadge.textContent = `Nível ${level}`;

    let items = [];
    if(gameMode === 'math') {
      let start = parseInt(currentStartValue) || 1;
      for(let i=0; i<slotsPerRound; i++) items.push({ val: start + i, type: 'math' });
    } else if(gameMode === 'alpha') {
      const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      let startChar = currentStartValue.toString().toUpperCase().charAt(0) || 'A';
      let idx = alpha.indexOf(startChar);
      if(idx === -1) idx = 0;
      for(let i=0; i<slotsPerRound; i++) items.push({ val: alpha[(idx + i) % 26], type: 'alpha' });
    } else {
      const keys = Object.keys(SHAPES);
      for(let i=0; i<slotsPerRound; i++) items.push({ val: keys[i % keys.length], type: 'shapes' });
    }

    // Criar Slots
    items.forEach((item, i) => {
      const slot = document.createElement('div');
      slot.className = 'target-slot';
      slot.dataset.val = item.val;
      
      let content = '';
      if(item.type === 'shapes') {
        content = `<path class="target-shape" d="${SHAPES[item.val]}" transform="translate(100, 120)"></path>`;
      } else {
        content = `<text class="target-content" x="100" y="190" text-anchor="middle" font-size="${item.val.toString().length > 2 ? 100 : 150}">${item.val}</text>`;
      }

      slot.innerHTML = `<svg viewBox="0 0 200 240">${content}</svg>`;
      playArea.appendChild(slot);
    });

    // Criar Peças (Embaralhadas)
    let shuffled = [...items].sort(() => Math.random() - 0.5);
    shuffled.forEach((item, i) => {
      const pDiv = document.createElement('div');
      pDiv.className = 'piece';
      pDiv.dataset.val = item.val;
      
      const color = COLORS[items.findIndex(it => it.val === item.val) % COLORS.length];
      let content = '';
      if(item.type === 'shapes') {
        content = `<path d="${SHAPES[item.val]}" transform="translate(100, 120)" fill="${color.m}" stroke="${color.d}" stroke-width="5"></path>`;
      } else {
        content = `<text x="100" y="190" text-anchor="middle" font-size="${item.val.toString().length > 2 ? 100 : 150}" fill="${color.m}" stroke="${color.d}" stroke-width="5">${item.val}</text>`;
      }

      pDiv.innerHTML = `
        <svg viewBox="0 0 200 240">
          ${content}
          <g class="eyes-group">
            <circle class="eye-white" cx="85" cy="65" r="15"></circle>
            <circle class="eye-pupil" cx="88" cy="68" r="6"></circle>
            <circle class="eye-white" cx="115" cy="65" r="15"></circle>
            <circle class="eye-pupil" cx="118" cy="68" r="6"></circle>
          </g>
        </svg>`;
      
      piecesContainer.appendChild(pDiv);
      setupDraggable(pDiv);
    });
  }

  // --- DRAG & DROP LOGIC ---
  function setupDraggable(el) {
    let isDragging = false;
    let offsetX, offsetY;

    el.addEventListener('pointerdown', (e) => {
      if(el.classList.contains('locked')) return;
      isDragging = true;
      el.classList.add('dragging');
      
      const rect = el.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      
      el.setPointerCapture(e.pointerId);
      speak(el.dataset.val);
    });

    window.addEventListener('pointermove', (e) => {
      if(!isDragging) return;
      el.style.position = 'fixed';
      el.style.left = (e.clientX - offsetX) + 'px';
      el.style.top = (e.clientY - offsetY) + 'px';
      
      const dx = e.movementX || 0;
      el.style.setProperty('--wiggle', Math.max(-10, Math.min(10, dx*0.8)) + 'deg');
    });

    window.addEventListener('pointerup', (e) => {
      if(!isDragging) return;
      isDragging = false;
      el.classList.remove('dragging');
      checkDrop(el);
    });
  }

  function checkDrop(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    
    const slots = document.querySelectorAll('.target-slot:not(.filled)');
    let found = false;

    slots.forEach(slot => {
      const sRect = slot.getBoundingClientRect();
      const dist = Math.hypot(cx - (sRect.left + sRect.width/2), cy - (sRect.top + sRect.height/2));
      
      if(dist < 60 && slot.dataset.val === el.dataset.val) {
        found = true;
        slot.classList.add('filled');
        el.classList.add('locked');
        
        el.style.position = 'absolute';
        el.style.left = '50%';
        el.style.top = '50%';
        el.style.transform = 'translate(-50%, -50%)';
        slot.appendChild(el);
        
        solvedCount++;
        
        if(solvedCount === slotsPerRound) {
          setTimeout(nextLevelInfinito, 600);
        } else {
          speak("Muito bem!");
        }
      }
    });

    if(!found) {
      el.style.position = ''; el.style.left = ''; el.style.top = ''; el.style.transform = '';
    }
  }

  function nextLevelInfinito() {
    speak("Incrível! Próximo nível!");
    spawnConfetti();
    
    // Mostrar overlay de transição
    transitionOverlay.classList.add('active');
    
    setTimeout(() => {
      level++;
      if(gameMode === 'math') {
        currentStartValue = (parseInt(currentStartValue) || 1) + slotsPerRound;
      } else if(gameMode === 'alpha') {
        const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let idx = alpha.indexOf(currentStartValue.toString().toUpperCase()) + slotsPerRound;
        currentStartValue = alpha[idx % 26];
      }
      
      initLevel();
      
      // Esconder overlay
      setTimeout(() => {
        transitionOverlay.classList.remove('active');
      }, 500);
    }, 1000);
  }

  // --- CONTROLES ---
  window.setMode = function(m) {
    gameMode = m;
    currentStartValue = (m === 'alpha' ? 'A' : '1');
    level = 1;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(`'${m}'`)));
    initLevel();
  };

  window.openTeacherMode = function() { teacherModal.classList.add('show'); };
  window.closeTeacherMode = function() { teacherModal.classList.remove('show'); };

  window.applyTeacherSettings = function() {
    gameMode = document.getElementById('t-mode').value;
    slotsPerRound = parseInt(document.getElementById('t-slots').value);
    currentStartValue = document.getElementById('t-start').value;
    level = 1;
    closeTeacherMode();
    initLevel();
  };

  // --- CONFETTI ---
  function spawnConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    let particles = [];
    for(let i=0; i<100; i++) {
      particles.push({
        x: Math.random() * canvas.width, y: -20,
        w: 10, h: 10,
        color: COLORS[Math.floor(Math.random()*COLORS.length)].m,
        vy: 3 + Math.random()*5, vx: -2 + Math.random()*4,
        r: Math.random()*360, vr: -15 + Math.random()*30
      });
    }
    function frame() {
      ctx.clearRect(0,0,canvas.width, canvas.height);
      let alive = false;
      particles.forEach(p => {
        p.y += p.vy; p.x += p.vx; p.r += p.vr;
        if(p.y < canvas.height) {
          alive = true;
          ctx.save();
          ctx.translate(p.x, p.y); ctx.rotate(p.r * Math.PI/180);
          ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();
        }
      });
      if(alive) requestAnimationFrame(frame);
    }
    frame();
  }

  initLevel();
})();
</script>
</body>
</html>
