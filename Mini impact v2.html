<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ProfBooks Elite</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a1405, #050301);
    overflow: hidden;
}

/* estrelas douradas */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.25;
    filter: sepia(1) hue-rotate(20deg) saturate(2);
}

/* aura dourada */
.aura {
    position: absolute;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(255,215,0,0.35), transparent 70%);
    border-radius: 50%;
    animation: pulse 3s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.4); opacity: 0.25; }
    100% { transform: scale(1); opacity: 0.6; }
}

/* container vidro premium */
.container {
    position: relative;
    padding: 50px;
    border-radius: 25px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,215,0,0.3);
    box-shadow: 
        0 0 80px rgba(255,215,0,0.25),
        inset 0 0 20px rgba(255,255,255,0.1);
    text-align: center;
}

/* ícone */
.icon {
    font-size: 45px;
    margin-bottom: 15px;
    animation: float 2.5s ease-in-out infinite;
    filter: drop-shadow(0 0 10px gold);
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* título */
.title {
    color: #fff;
    font-size: 14px;
    letter-spacing: 4px;
    margin-bottom: 25px;
    opacity: 0.85;
}

/* botão premium */
.button {
    position: relative;
    padding: 18px 55px;
    font-size: 20px;
    color: #fff;
    border-radius: 14px;
    text-decoration: none;
    background: linear-gradient(145deg, #d4af37, #fff6cc);
    color: #3a2b00;
    font-weight: bold;
    overflow: hidden;
    display: inline-block;
    transition: 0.4s;
    box-shadow: 
        0 0 25px rgba(255,215,0,0.6),
        inset 0 0 10px rgba(255,255,255,0.5);
}

/* borda energética */
.button::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 14px;
    background: linear-gradient(90deg, #fff, #ffd700, #fff);
    background-size: 300%;
    animation: glow 4s linear infinite;
    z-index: -1;
}

@keyframes glow {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
}

/* brilho passando */
.button::after {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.9),
        transparent
    );
    transition: 0.6s;
}

.button:hover::after {
    left: 140%;
}

/* hover */
.button:hover {
    transform: scale(1.12);
    box-shadow: 
        0 0 50px rgba(255,215,0,0.9),
        inset 0 0 15px rgba(255,255,255,0.6);
}

/* partículas douradas */
.particle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: radial-gradient(circle, #ffd700, #ffb700);
    border-radius: 50%;
    box-shadow: 0 0 10px gold;
    animation: rise linear infinite;
}

@keyframes rise {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="aura"></div>

<script>
for (let i = 0; i < 30; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(p);
}
</script>

<div class="container">
    <div class="icon">📚✨</div>
    <div class="title">PORTAL PREMIUM</div>

    <a href="https://nexusbooks-ktqs54kq.manus.space/" target="_blank" class="button">
        🚀 Acessar ProfBooks
    </a>
</div>

</body>
</html>
