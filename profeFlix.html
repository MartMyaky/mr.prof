<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NEXUS HUB SUPREMO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 background:#0a0a0f;
 color:white;
 font-family:Arial;
}

header{
 display:flex;
 justify-content:space-between;
 padding:15px;
 background:#000;
 position:sticky;
 top:0;
}

#search{
 padding:10px;
 border-radius:20px;
 border:none;
 width:250px;
}

.row{padding:20px}
.cards{display:flex;gap:10px;overflow-x:auto}

.card{
 min-width:200px;
 background:#111;
 border-radius:10px;
 overflow:hidden;
 cursor:pointer;
 transition:0.3s;
}

.card:hover{transform:scale(1.1)}

.card img{width:100%}

.player iframe{width:100%;height:400px;border:none}
</style>
</head>

<body>

<header>
<h2>NEXUS HUB</h2>
<input id="search" placeholder="Buscar tudo...">
</header>

<div class="player" id="player"></div>

<div class="row">
<h2>🔥 Filmes</h2>
<div class="cards" id="movies"></div>
</div>

<div class="row">
<h2>🎌 Animes</h2>
<div class="cards" id="anime"></div>
</div>

<div class="row">
<h2>🎧 Música</h2>
<div id="music"></div>
</div>

<div class="row">
<h2>📚 Livros</h2>
<div id="books"></div>
</div>

<script>
const TMDB = "2618a134d307bed39b5be6d0ec791453";

// PLAYER
function playYT(id){
 player.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
 window.scrollTo({top:0,behavior:'smooth'});
}

// CARD
function card(img,title,click){
 let d=document.createElement('div');
 d.className="card";
 d.innerHTML=`<img src="${img}"><p>${title}</p>`;
 d.onclick=click;
 return d;
}

// FILMES (TMDB)
fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB}`)
.then(r=>r.json())
.then(d=>{
 d.results.forEach(m=>{
  movies.appendChild(
   card(
    "https://image.tmdb.org/t/p/w500"+m.poster_path,
    m.title,
    ()=>searchYT(m.title+" trailer")
   )
  );
 });
});

// ANIME (JIKAN)
fetch("https://api.jikan.moe/v4/anime")
.then(r=>r.json())
.then(d=>{
 d.data.forEach(a=>{
  anime.appendChild(
   card(
    a.images.jpg.image_url,
    a.title,
    ()=>searchYT(a.title+" anime")
   )
  );
 });
});

// YOUTUBE BUSCA
async function searchYT(q){
 let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&key=AIzaSyAbJX9WQwxIO2DP-ud_3kCzDCJ-5MqjxU4`);
 let data = await res.json();
 let vid = data.items[0].id.videoId;
 playYT(vid);
}

// MÚSICA (SPOTIFY EMBED)
music.innerHTML = `
<iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
width="100%" height="200"></iframe>
`;

// LIVROS
fetch("https://openlibrary.org/search.json?q=anime")
.then(r=>r.json())
.then(d=>{
 d.docs.slice(0,10).forEach(b=>{
  books.innerHTML += `<p>${b.title}</p>`;
 });
});

// BUSCA GLOBAL
search.oninput = ()=>{
 if(search.value.length > 2){
  searchYT(search.value);
 }
};
</script>

</body>
</html>
